name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build & Release Linux binary
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download Modules
        run: go mod download

      - name: Build Application (Linux AMD64)
        run: |
          GOOS=linux GOARCH=amd64 go build -v -o lyncis-agent-linux-amd64 .

      - name: Build Application (Linux ARM64)
        run: |
          GOOS=linux GOARCH=arm64 go build -v -o lyncis-agent-linux-arm64 .

      - name: Generate Release Notes
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lyncis-agent-linux-amd64
            lyncis-agent-linux-arm64
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}